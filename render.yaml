# ────────────────────────────────────────────────────────────────
# Intelli-Credit — Render.com Deployment Configuration
# Defines ALL services in one file for one-click deployment.
# Docs: https://render.com/docs/blueprint-spec
# ────────────────────────────────────────────────────────────────

services:
  # ── FastAPI Backend Web Server ────────────────────────────────
  - type: web
    name: intelli-credit-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true   # Render auto-generates a secure random key
      - key: ALLOWED_ORIGINS
        sync: false        # Set to your Vercel/Netlify frontend URL
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: intelli-credit-redis
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: ap-south-1

  # ── Celery Background Worker ──────────────────────────────────
  - type: worker
    name: intelli-credit-celery-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A services.worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: intelli-credit-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false

  # ── Redis for Celery ──────────────────────────────────────────
  - type: redis
    name: intelli-credit-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # Empty = internal access only (Celery worker only)
